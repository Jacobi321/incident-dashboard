<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Osogbo RCC Dashboard</title>
<meta name="theme-color" content="#0B1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0B1220;
    --panel: #121C30;
    --panel-border: #223151;
    --ink: #E7ECF5;
    --muted: #7C8AA3;
    --amber: #F2A93B;
    --red: #E5484D;
    --blue: #4C8DFF;
    --green: #36C58C;
    --radius: 6px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding-bottom: 48px;
    min-height: 100vh;
  }

  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 2px;
  }

  /* ---- Header / signature waveform ---- */

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(180deg, #0E1626 0%, #0B1220 100%);
    border-bottom: 1px solid var(--panel-border);
    padding: 14px 16px 12px;
  }

  .brand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .brand {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.06em;
    color: var(--ink);
  }

  .brand span { color: var(--amber); }

  .month-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .wave-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }

  .wave-wrap {
    flex: 1;
    height: 28px;
    overflow: hidden;
    position: relative;
  }

  .wave-wrap svg {
    position: absolute;
    top: 0;
    left: 0;
    height: 28px;
    width: 200%;
  }

  @media (prefers-reduced-motion: no-preference) {
    .wave-wrap svg { animation: scrollWave 3.6s linear infinite; }
  }

  @keyframes scrollWave {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .freq-readout {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 18px;
    color: var(--amber);
    white-space: nowrap;
  }

  .freq-readout small {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 3px;
  }

  .updated-row {
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .updated-text {
    font-size: 11px;
    color: var(--muted);
  }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 5px 10px;
    border-radius: var(--radius);
    text-transform: uppercase;
  }

  .refresh-btn:active { background: var(--panel); }

  /* ---- Layout ---- */

  main {
    padding: 16px;
    max-width: 560px;
    margin: 0 auto;
  }

  section { margin-bottom: 22px; }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 8px 2px;
  }

  /* ---- Stat tiles ---- */

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-tile {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }

  .stat-tile .label {
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat-tile .value {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 24px;
    line-height: 1;
  }

  .stat-tile .value.amber { color: var(--amber); }
  .stat-tile .value.red { color: var(--red); }
  .stat-tile .value.green { color: var(--green); }

  .stat-tile .sub {
    margin-top: 4px;
    font-size: 11px;
    color: var(--muted);
  }

  /* ---- Chart panels ---- */

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .panel canvas { max-height: 220px; }

  .empty-note {
    font-size: 12.5px;
    color: var(--muted);
    padding: 10px 2px;
    line-height: 1.5;
  }

  /* ---- Incident log ---- */

  .log-entry {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-left-width: 3px;
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 8px;
  }

  .log-entry.type-forced { border-left-color: var(--amber); }
  .log-entry.type-planned { border-left-color: var(--blue); }
  .log-entry.type-emergency, .log-entry.type-urgent { border-left-color: var(--red); }
  .log-entry.type-other { border-left-color: var(--muted); }

  .log-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }

  .log-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .log-meta b { color: var(--ink); }

  .pill {
    font-size: 9.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
  }

  .pill.type-forced { color: var(--amber); background: rgba(242,169,59,0.12); }
  .pill.type-planned { color: var(--blue); background: rgba(76,141,255,0.12); }
  .pill.type-emergency, .pill.type-urgent { color: var(--red); background: rgba(229,72,77,0.12); }
  .pill.type-other { color: var(--muted); background: rgba(124,138,163,0.12); }

  .log-desc {
    margin-top: 6px;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .log-foot {
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* ---- States ---- */

  .state-box {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .state-box .big { font-size: 28px; margin-bottom: 8px; }

  .state-box button {
    margin-top: 14px;
    background: var(--amber);
    color: #1A1303;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 9px 18px;
    border-radius: var(--radius);
  }

  #app { display: none; }
</style>
</head>
<body>

<header>
  <div class="brand-row">
    <div class="brand">OSOGBO <span>RCC</span></div>
    <div class="month-label" id="monthLabel">—</div>
  </div>
  <div class="wave-row">
    <div class="wave-wrap">
      <svg viewBox="0 0 400 28" preserveAspectRatio="none">
        <path d="M0,14 C10,2 20,2 30,14 C40,26 50,26 60,14 C70,2 80,2 90,14 C100,26 110,26 120,14 C130,2 140,2 150,14 C160,26 170,26 180,14 C190,2 200,2 210,14 C220,26 230,26 240,14 C250,2 260,2 270,14 C280,26 290,26 300,14 C310,2 320,2 330,14 C340,26 350,26 360,14 C370,2 380,2 390,14 C395,20 398,20 400,14"
          fill="none" stroke="#F2A93B" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="freq-readout" id="freqReadout">— <small>Hz</small></div>
  </div>
  <div class="updated-row">
    <div class="updated-text" id="updatedText">Loading…</div>
    <button class="refresh-btn" id="refreshBtn" aria-label="Refresh dashboard">Refresh</button>
  </div>
</header>

<div id="loading" class="state-box">
  <div class="big mono">~∿~</div>
  Pulling the latest figures…
</div>

<div id="errorBox" class="state-box" style="display:none;">
  <div class="big">⚠</div>
  <div id="errorText">Couldn't reach the spreadsheet.</div>
  <button id="retryBtn">Retry</button>
</div>

<main id="app">
  <section>
    <div class="stat-grid">
      <div class="stat-tile">
        <div class="label">Incidents this month</div>
        <div class="value" id="statTotal">0</div>
      </div>
      <div class="stat-tile">
        <div class="label">MW interrupted</div>
        <div class="value amber" id="statMW">0.0</div>
      </div>
      <div class="stat-tile">
        <div class="label">Still open</div>
        <div class="value red" id="statOpen">0</div>
      </div>
      <div class="stat-tile">
        <div class="label">Today's max load</div>
        <div class="value green" id="statMaxLoad">—</div>
        <div class="sub" id="statMaxLoadSub">—</div>
      </div>
    </div>
  </section>

  <section>
    <div class="section-label">Load trend (Max / Min, MW)</div>
    <div class="panel" id="trendPanel">
      <canvas id="trendChart"></canvas>
    </div>
  </section>

  <section>
    <div class="section-label">Incidents by type</div>
    <div class="panel" id="typePanel">
      <canvas id="typeChart"></canvas>
    </div>
  </section>

  <section>
    <div class="section-label">Recent log</div>
    <div id="logList"></div>
  </section>
</main>

<script>
  // ---- CONFIG -------------------------------------------------------
  // Paste your Apps Script Web App URL here (from Deploy > New deployment).
  var CONFIG = {
    API_URL: 'https://script.google.com/macros/s/AKfycbzfRUPH7_4qv9-qvnLP04E1v_f7bMamjL--NJhth-F2L_pTpKkozvA88s6HzdsiTVHW/exec'
  };

  var trendChart, typeChart;

  function typeClass(type) {
    var t = (type || '').toString().trim().toUpperCase();
    if (t === 'FORCED') return 'type-forced';
    if (t === 'PLANNED') return 'type-planned';
    if (t === 'EMERGENCY') return 'type-emergency';
    if (t === 'URGENT') return 'type-urgent';
    return 'type-other';
  }

  function escapeHtml(s) {
    return (s || '').toString()
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function showState(id) {
    document.getElementById('loading').style.display = id === 'loading' ? 'block' : 'none';
    document.getElementById('errorBox').style.display = id === 'error' ? 'block' : 'none';
    document.getElementById('app').style.display = id === 'app' ? 'block' : 'none';
  }

  function renderStats(data) {
    var s = data.incidentStats || { total: 0, totalMWInterrupted: 0, openCount: 0 };
    document.getElementById('statTotal').textContent = s.total;
    document.getElementById('statMW').textContent = s.totalMWInterrupted.toFixed(1);
    document.getElementById('statOpen').textContent = s.openCount;

    var latest = data.latestReading;
    if (latest) {
      document.getElementById('statMaxLoad').textContent = latest.maxMW;
      document.getElementById('statMaxLoadSub').textContent = latest.date + ' · ' + latest.maxTime;
      document.getElementById('freqReadout').innerHTML = latest.maxFreq + ' <small>Hz</small>';
    } else {
      document.getElementById('statMaxLoad').textContent = '—';
      document.getElementById('statMaxLoadSub').textContent = 'No readings yet';
    }
  }

  function renderTrendChart(data) {
    var panel = document.getElementById('trendPanel');
    var rows = data.loadTrend || [];

    if (!rows.length) {
      panel.innerHTML = '<div class="empty-note">' +
        (data.maxMinSheetFound
          ? 'No Daily Max/Min readings logged yet this month.'
          : 'No Daily Max/Min tab found for this month yet.') +
        '</div>';
      return;
    }

    panel.innerHTML = '<canvas id="trendChart"></canvas>';
    var ctx = document.getElementById('trendChart').getContext('2d');
    if (trendChart) trendChart.destroy();

    trendChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: rows.map(function (r) { return r.date; }),
        datasets: [
          {
            label: 'Max MW',
            data: rows.map(function (r) { return parseFloat(r.maxMW) || null; }),
            borderColor: '#F2A93B',
            backgroundColor: 'rgba(242,169,59,0.12)',
            fill: true, tension: 0.25, pointRadius: 0, borderWidth: 2
          },
          {
            label: 'Min MW',
            data: rows.map(function (r) { return parseFloat(r.minMW) || null; }),
            borderColor: '#4C8DFF',
            backgroundColor: 'rgba(76,141,255,0.10)',
            fill: true, tension: 0.25, pointRadius: 0, borderWidth: 2
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#7C8AA3', font: { family: 'IBM Plex Mono', size: 11 } } }
        },
        scales: {
          x: { ticks: { color: '#7C8AA3', maxTicksLimit: 6, font: { size: 10 } }, grid: { color: '#223151' } },
          y: { ticks: { color: '#7C8AA3', font: { size: 10 } }, grid: { color: '#223151' } }
        }
      }
    });
    document.getElementById('trendChart').parentElement.style.height = '220px';
  }

  function renderTypeChart(data) {
    var panel = document.getElementById('typePanel');
    var byType = (data.incidentStats && data.incidentStats.byType) || {};
    var labels = ['FORCED', 'PLANNED', 'EMERGENCY', 'URGENT'];
    var values = labels.map(function (l) { return byType[l] || 0; });

    if (!values.some(function (v) { return v > 0; })) {
      panel.innerHTML = '<div class="empty-note">' +
        (data.incidentSheetFound
          ? "No incidents logged yet this month - the grid's been quiet."
          : 'No Incident Report tab found for this month yet.') +
        '</div>';
      return;
    }

    panel.innerHTML = '<canvas id="typeChart"></canvas>';
    var ctx = document.getElementById('typeChart').getContext('2d');
    if (typeChart) typeChart.destroy();

    typeChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          data: values,
          backgroundColor: ['#F2A93B', '#4C8DFF', '#E5484D', '#E5484D'],
          borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#7C8AA3', font: { size: 10 } }, grid: { color: '#223151' } },
          y: { ticks: { color: '#E7ECF5', font: { family: 'IBM Plex Mono', size: 11 } }, grid: { display: false } }
        }
      }
    });
    document.getElementById('typeChart').parentElement.style.height = '180px';
  }

  function renderLog(data) {
    var list = document.getElementById('logList');
    var rows = data.recentIncidents || [];

    if (!rows.length) {
      list.innerHTML = '<div class="empty-note">Nothing reported yet this month.</div>';
      return;
    }

    list.innerHTML = rows.map(function (r) {
      var cls = typeClass(r.type);
      var mw = parseFloat(r.loadInterruptedMW);
      var mwText = !isNaN(mw) && mw > 0 ? '↓ ' + mw + ' MW' : '';
      return '' +
        '<div class="log-entry ' + cls + '">' +
          '<div class="log-top">' +
            '<div class="log-meta"><b>' + escapeHtml(r.date) + '</b> ' + escapeHtml(r.timeOut) + ' · ' + escapeHtml(r.location) + '</div>' +
            '<span class="pill ' + cls + '">' + escapeHtml(r.type) + '</span>' +
          '</div>' +
          '<div class="log-desc">' + escapeHtml(r.description) + '</div>' +
          (mwText || r.status ? '<div class="log-foot">' + [mwText, escapeHtml(r.status)].filter(Boolean).join(' · ') + '</div>' : '') +
        '</div>';
    }).join('');
  }

  function renderAll(data) {
    document.getElementById('monthLabel').textContent = data.month;
    document.getElementById('updatedText').textContent =
      'Updated ' + new Date(data.generatedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    renderStats(data);
    renderTrendChart(data);
    renderTypeChart(data);
    renderLog(data);

    showState('app');
  }

  function loadDashboard() {
    showState('loading');
    fetch(CONFIG.API_URL + (CONFIG.API_URL.indexOf('?') === -1 ? '?' : '&') + 'cb=' + Date.now())
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (data) {
        if (data.error) throw new Error(data.error);
        renderAll(data);
      })
      .catch(function (err) {
        document.getElementById('errorText').textContent =
          'Couldn\'t load the dashboard (' + err.message + '). Check your connection and try again.';
        showState('error');
      });
  }

  document.getElementById('refreshBtn').addEventListener('click', loadDashboard);
  document.getElementById('retryBtn').addEventListener('click', loadDashboard);

  if (CONFIG.API_URL.indexOf('PASTE_YOUR') !== -1) {
    document.getElementById('errorText').textContent =
      'Set CONFIG.API_URL in index.html to your deployed Apps Script Web App URL.';
    showState('error');
  } else {
    loadDashboard();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    });
  }
</script>

</body>
</html>
